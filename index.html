<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmarks — Field Camera</title>

<style>
/* ============================================================
   DESIGN TOKENS — "Vintage Film Camera" direction
   Base: bakelite-black camera body, aged brass fittings
   Accent: Kodak-gold film-box orange, warm darkroom red
   Type: condensed engraved caps for chrome labels (letter-spaced
         system sans, since no external fonts are allowed),
         monospace for exposure-counter style numbers
   Signature: bookmarks styled as film negative frames with
              sprocket holes; canvas film-grain + light-leak sweep
   ============================================================ */
:root{
  --body-black:#1a1613;     /* camera body / deepest background */
  --body-black-2:#211c18;   /* slightly raised body panel */
  --leather:#2b241f;        /* card / leatherette surface */
  --leather-hi:#352c25;     /* hover / raised leatherette */
  --seam:#3d332b;           /* stitch / hairline border */
  --seam-soft:#2f2822;
  --paper:#ece3cd;          /* primary text — bleached print paper */
  --paper-dim:#a99a80;      /* secondary text — aged paper */
  --paper-low:#6e6152;      /* tertiary text — shadowed paper */
  --brass:#c8973f;          /* aged brass fitting */
  --brass-hi:#e3b563;
  --film-orange:#c8672f;    /* Kodak-gold film-box accent (signature) */
  --film-orange-glow:rgba(200,103,47,0.22);
  --darkroom-red:#8a3b32;   /* safelight red, used sparingly */
  --ok:#7c9a6d;
  --radius-l:4px;            /* cameras don't have rounded plastic corners */
  --radius-m:3px;
  --radius-s:2px;
  --font-ui: 'Segoe UI', system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  --ease: cubic-bezier(.22,.61,.36,1);
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--body-black);
  color:var(--paper);
  font-family:var(--font-ui);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
}

a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

:focus-visible{
  outline:2px solid var(--film-orange);
  outline-offset:2px;
  border-radius:2px;
}

/* ============================================================
   SIGNATURE — film grain canvas + light-leak sweep + vignette.
   Grain is drawn once to the canvas as static noise (cheap: no
   per-frame redraw needed) and blended with mix-blend-mode.
   A slow light-leak gradient drifts across the top corner on a
   long CSS animation loop — quiet, not distracting.
   ============================================================ */
#grain-canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  opacity:0.05;
  mix-blend-mode:overlay;
  pointer-events:none;
}
.bg-vignette{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    radial-gradient(ellipse 900px 600px at 8% -8%, rgba(200,103,47,0.10), transparent 55%),
    radial-gradient(ellipse 700px 500px at 100% 108%, rgba(140,60,50,0.07), transparent 55%),
    radial-gradient(ellipse 1400px 900px at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
}
.bg-light-leak{
  position:fixed;
  top:-30%; left:-20%;
  width:70%; height:140%;
  z-index:1;
  pointer-events:none;
  background:linear-gradient(115deg,
    rgba(200,103,47,0.16) 0%,
    rgba(200,103,47,0.05) 35%,
    transparent 60%);
  filter:blur(40px);
  animation:leak-drift 26s ease-in-out infinite alternate;
}
@keyframes leak-drift{
  0%{ transform:translate(-4%, -2%) rotate(0deg); opacity:.75; }
  100%{ transform:translate(6%, 4%) rotate(4deg); opacity:1; }
}

/* ============================================================
   LAYOUT
   ============================================================ */
.wrap{
  position:relative;
  z-index:2;
  max-width:1180px;
  margin:0 auto;
  padding:36px 24px 80px;
}

/* ---------- Masthead: minimal camera-body strip ---------- */
.masthead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:0 4px 28px;
  margin-bottom:8px;
  border-bottom:1px solid var(--seam);
}
.masthead-brand{
  display:flex;
  align-items:baseline;
  gap:10px;
}
.masthead-brand .lens-dot{
  width:9px;height:9px;
  border-radius:50%;
  background:var(--film-orange);
  box-shadow:0 0 10px var(--film-orange-glow), inset 0 0 0 2px rgba(0,0,0,.25);
  flex:0 0 auto;
}
.masthead-title{
  font-size:19px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--paper);
}
.masthead-counter{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--paper-low);
  letter-spacing:.05em;
}

/* ---------- Section headers ---------- */
.section-heading{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:0 4px 16px;
  gap:12px;
  flex-wrap:wrap;
}
.section-heading h2{
  font-size:12px;
  font-weight:700;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:var(--paper-dim);
  margin:0;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-heading h2::before{
  content:"";
  width:14px;height:1px;
  background:var(--film-orange);
}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
  border:1px solid var(--seam);
  background:var(--leather);
  color:var(--paper);
  padding:9px 14px;
  border-radius:var(--radius-s);
  font-size:12.5px;
  font-weight:600;
  letter-spacing:.03em;
  text-transform:uppercase;
  transition:background .2s var(--ease), border-color .2s var(--ease), transform .15s var(--ease);
}
.btn:hover{background:var(--leather-hi); border-color:#4a3e33;}
.btn:active{transform:scale(0.97);}
.btn-primary{
  background:var(--film-orange);
  border-color:var(--film-orange);
  color:#221208;
}
.btn-primary:hover{background:#d97a41; border-color:#d97a41;}
.btn-icon-only{padding:9px;}
.btn-danger:hover{background:rgba(138,59,50,0.25); border-color:var(--darkroom-red); color:#e0a89e;}

/* ---------- Main grid: bookmarks (left) + sidebar (right) ---------- */
.main-grid{
  display:grid;
  grid-template-columns: 1fr 320px;
  gap:28px;
  align-items:start;
}
@media (max-width: 900px){
  .main-grid{grid-template-columns: 1fr;}
}

/* ============================================================
   BOOKMARK GRID — signature element: each bookmark is a film
   negative frame. Sprocket holes run along the top and bottom
   edge, and the "frame number" doubles as a subtle index.
   ============================================================ */
.bookmark-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
  gap:16px;
}
.bm-card{
  position:relative;
  background:var(--leather);
  border:1px solid var(--seam);
  border-radius:var(--radius-m);
  padding:20px 14px 14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  text-align:center;
  cursor:grab;
  transition:transform .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease);
  animation: frame-in .35s var(--ease) both;
}
@keyframes frame-in{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}
.bm-card:hover{
  border-color:var(--brass);
  background:var(--leather-hi);
  transform:translateY(-3px);
}
.bm-card.dragging{ opacity:.4; cursor:grabbing; }
.bm-card.drag-over{
  border-color:var(--film-orange);
  box-shadow:0 0 0 3px var(--film-orange-glow);
}
/* Sprocket holes — top and bottom edge, like 35mm film stock */
.bm-card::before, .bm-card::after{
  content:"";
  position:absolute;
  left:0; right:0;
  height:10px;
  background-image:radial-gradient(circle, var(--body-black) 2.6px, transparent 2.7px);
  background-size:16px 10px;
  background-repeat:repeat-x;
  background-position:6px center;
  opacity:.9;
}
.bm-card::before{ top:0; }
.bm-card::after{ bottom:0; }
.bm-frame-number{
  position:absolute;
  top:12px; left:8px;
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--paper-low);
  letter-spacing:.04em;
}
.bm-favicon{
  width:34px;height:34px;
  border-radius:3px;
  background:var(--body-black-2);
  border:1px solid var(--seam-soft);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  flex:0 0 auto;
  margin-top:4px;
}
.bm-favicon img{width:20px;height:20px;object-fit:contain;}
.bm-name{
  font-size:13px;
  font-weight:600;
  color:var(--paper);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
.bm-url-label{
  font-size:10px;
  color:var(--paper-low);
  font-family:var(--font-mono);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
.bm-actions{
  position:absolute;
  top:12px; right:8px;
  display:flex;
  gap:4px;
  opacity:0;
  transition:opacity .15s var(--ease);
}
.bm-card:hover .bm-actions, .bm-card:focus-within .bm-actions{opacity:1;}
.bm-action-btn{
  width:22px;height:22px;
  border-radius:2px;
  border:none;
  background:var(--body-black-2);
  color:var(--paper-dim);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:12px;
}
.bm-action-btn:hover{background:var(--darkroom-red); color:#fff;}
.bm-action-btn.edit-btn:hover{background:var(--film-orange); color:#221208;}

.bm-add-card{
  border-style:dashed;
  color:var(--paper-low);
  cursor:pointer;
  min-height:108px;
  justify-content:center;
}
.bm-add-card:hover{color:var(--film-orange); border-color:var(--brass);}
.bm-add-card .plus{font-size:22px; line-height:1;}

.empty-state{
  grid-column:1/-1;
  text-align:center;
  padding:48px 20px;
  color:var(--paper-low);
  font-size:13px;
  border:1px dashed var(--seam);
  border-radius:var(--radius-m);
}

/* ---------- Sidebar ---------- */
.sidebar{
  display:flex;
  flex-direction:column;
  gap:22px;
}
.panel{
  background:var(--leather);
  border:1px solid var(--seam);
  border-radius:var(--radius-m);
  padding:18px;
}
.panel-title{
  font-size:12px;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--paper-dim);
  margin:0 0 14px;
  display:flex;
  align-items:center;
  gap:8px;
}
.panel-title::before{
  content:"";
  width:14px;height:1px;
  background:var(--brass);
}

/* Quick URL — paste-and-save link list */
.quick-url-form{
  display:flex;
  gap:8px;
}
.quick-url-input{
  flex:1;
  min-width:0;
  background:var(--body-black-2);
  border:1px solid var(--seam-soft);
  color:var(--paper);
  font-family:var(--font-ui);
  font-size:13.5px;
  padding:10px 12px;
  border-radius:var(--radius-s);
  outline:none;
  transition:border-color .2s var(--ease);
}
.quick-url-input:focus{border-color:var(--brass);}
.quick-url-input::placeholder{color:var(--paper-low);}
.quick-url-list{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:12px;
  max-height:280px;
  overflow-y:auto;
}
.quick-url-item{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--body-black-2);
  border:1px solid var(--seam-soft);
  border-radius:var(--radius-s);
  padding:9px 10px;
  cursor:pointer;
  transition:border-color .18s var(--ease), background .18s var(--ease);
}
.quick-url-item:hover{border-color:var(--brass); background:#241f1a;}
.quick-url-favicon{
  width:20px;height:20px;
  border-radius:2px;
  background:var(--leather);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  flex:0 0 auto;
}
.quick-url-favicon img{width:13px;height:13px;object-fit:contain;}
.quick-url-text{
  flex:1;
  min-width:0;
  font-size:13px;
  color:var(--paper);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.quick-url-delete{
  flex:0 0 auto;
  width:22px;height:22px;
  border-radius:2px;
  border:none;
  background:transparent;
  color:var(--paper-low);
  cursor:pointer;
  font-size:12px;
  opacity:0;
  transition:opacity .15s var(--ease), background .15s var(--ease), color .15s var(--ease);
}
.quick-url-item:hover .quick-url-delete{opacity:1;}
.quick-url-delete:hover{background:var(--darkroom-red); color:#fff;}
.quick-url-empty{
  text-align:center;
  color:var(--paper-low);
  font-size:12px;
  padding:20px 8px;
}

/* Backup panel — export/import row */
.backup-row{
  display:flex;
  gap:8px;
}
.backup-row .btn{flex:1; justify-content:center;}
.backup-hint{
  margin-top:10px;
  font-size:11px;
  color:var(--paper-low);
  line-height:1.5;
}
.danger-zone{
  margin-top:14px;
  padding-top:14px;
  border-top:1px solid var(--seam-soft);
}
.btn-full-danger{
  width:100%;
  justify-content:center;
  color:#d99589;
  border-color:rgba(138,59,50,0.4);
}
.btn-full-danger:hover{
  background:rgba(138,59,50,0.2);
  border-color:var(--darkroom-red);
  color:#e0a89e;
}

/* ============================================================
   MODAL (Add/Edit bookmark)
   ============================================================ */
.modal-overlay{
  position:fixed; inset:0;
  background:rgba(10,8,6,0.72);
  backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center;
  z-index:100;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s var(--ease);
  padding:20px;
}
.modal-overlay.open{opacity:1; pointer-events:auto;}
.modal{
  background:var(--leather);
  border:1px solid var(--seam);
  border-radius:var(--radius-m);
  padding:24px;
  width:100%;
  max-width:400px;
  transform:translateY(10px) scale(.98);
  transition:transform .2s var(--ease);
}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal h3{
  margin:0 0 18px;
  font-size:14px;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--paper);
}
.field{margin-bottom:14px;}
.field label{
  display:block;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--paper-dim);
  margin-bottom:6px;
}
.field input{
  width:100%;
  background:var(--body-black-2);
  border:1px solid var(--seam-soft);
  color:var(--paper);
  padding:10px 12px;
  border-radius:var(--radius-s);
  font-size:14px;
  outline:none;
  font-family:inherit;
  transition:border-color .2s var(--ease);
}
.field input:focus{border-color:var(--brass);}
.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:20px;
}

/* ============================================================
   COMMAND PALETTE (Ctrl+K)
   ============================================================ */
.palette-overlay{
  position:fixed; inset:0;
  background:rgba(10,8,6,0.75);
  backdrop-filter:blur(3px);
  z-index:200;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:12vh;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s var(--ease);
}
.palette-overlay.open{opacity:1; pointer-events:auto;}
.palette{
  width:100%;
  max-width:560px;
  background:var(--leather);
  border:1px solid var(--seam);
  border-radius:var(--radius-m);
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  transform:translateY(-8px);
  transition:transform .2s var(--ease);
}
.palette-overlay.open .palette{transform:translateY(0);}
.palette-input-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px 18px;
  border-bottom:1px solid var(--seam);
}
.palette-input-row svg{flex:0 0 auto; color:var(--paper-low);}
#palette-input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--paper);
  font-size:16px;
}
#palette-input::placeholder{color:var(--paper-low);}
.palette-results{
  max-height:340px;
  overflow-y:auto;
  padding:8px;
}
.palette-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-radius:var(--radius-s);
  cursor:pointer;
}
.palette-item.active, .palette-item:hover{background:var(--leather-hi);}
.palette-item .pf{
  width:22px;height:22px;border-radius:2px;background:var(--body-black-2);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;overflow:hidden;
}
.palette-item .pf img{width:14px;height:14px;}
.palette-item .pname{font-size:13.5px; color:var(--paper);}
.palette-item .purl{font-size:11px; color:var(--paper-low); margin-left:auto; font-family:var(--font-mono);}
.palette-empty{padding:24px; text-align:center; color:var(--paper-low); font-size:13px;}
.palette-footer{
  display:flex;
  gap:16px;
  padding:10px 18px;
  border-top:1px solid var(--seam);
  font-size:11px;
  color:var(--paper-low);
  font-family:var(--font-mono);
}
.palette-footer span{display:flex;align-items:center;gap:5px;}
.palette-footer kbd{
  background:var(--body-black-2);
  border:1px solid var(--seam);
  border-radius:2px;
  padding:1px 5px;
}

/* ---------- Toast ---------- */
.toast{
  position:fixed;
  bottom:24px; left:50%;
  transform:translate(-50%, 20px);
  background:var(--leather);
  border:1px solid var(--seam);
  color:var(--paper);
  padding:12px 20px;
  border-radius:var(--radius-s);
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:all .25s var(--ease);
  z-index:300;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.toast.show{opacity:1; transform:translate(-50%, 0);}

/* ---------- Screen-reader only text ---------- */
.sr-only{
  position:absolute; width:1px; height:1px;
  padding:0; margin:-1px; overflow:hidden;
  clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* ---------- Scrollbars (subtle) ---------- */
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--seam); border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--brass);}

/* ---------- Mobile ---------- */
@media (max-width: 560px){
  .wrap{padding:24px 14px 60px;}
  .masthead-title{font-size:16px;}
  .bookmark-grid{grid-template-columns:repeat(auto-fill, minmax(128px,1fr));}
}
</style>
</head>
<body>

<!-- Signature background: film grain + light leak + vignette -->
<canvas id="grain-canvas" aria-hidden="true"></canvas>
<div class="bg-light-leak" aria-hidden="true"></div>
<div class="bg-vignette" aria-hidden="true"></div>

<div class="wrap">

  <!-- Minimal masthead — just a marker, no clock/greeting/search -->
  <div class="masthead">
    <div class="masthead-brand">
      <span class="lens-dot" aria-hidden="true"></span>
      <span class="masthead-title">Bookmarks</span>
    </div>
    <span class="masthead-counter" id="frame-counter">EXP. 00</span>
  </div>

  <div class="main-grid">
    <!-- =========================================================
         LEFT: BOOKMARK MANAGER (no categories)
    ========================================================== -->
    <section>
      <div class="section-heading">
        <h2>Roll</h2>
        <button class="btn btn-primary" id="add-bookmark-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          เพิ่ม Bookmark
        </button>
      </div>

      <!-- Bookmark card grid (drag & drop enabled), styled as film frames -->
      <div class="bookmark-grid" id="bookmark-grid" aria-live="polite"></div>
    </section>

    <!-- =========================================================
         RIGHT: SIDEBAR — Quick URL + Backup
    ========================================================== -->
    <aside class="sidebar">

      <!-- Quick URL — paste a link, save it, click to open. Add many. -->
      <div class="panel">
        <h3 class="panel-title">Quick URL</h3>
        <form id="quick-url-form" class="quick-url-form">
          <label for="quick-url-input" class="sr-only">วาง URL เพื่อบันทึก</label>
          <input type="text" id="quick-url-input" class="quick-url-input" placeholder="วางลิงก์ที่นี่แล้วกด Enter..." autocomplete="off">
          <button type="submit" class="btn btn-primary btn-icon-only" aria-label="บันทึกลิงก์">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          </button>
        </form>
        <div id="quick-url-list" class="quick-url-list"></div>

      <!-- Backup / Restore — export & import all data as JSON -->
      <div class="panel">
        <h3 class="panel-title">Backup</h3>
        <div class="backup-row">
          <button type="button" class="btn" id="export-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Export
          </button>
          <button type="button" class="btn" id="import-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 15V3m0 0l-4 4m4-4l4 4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Import
          </button>
        </div>
        <input type="file" id="import-file-input" accept="application/json,.json" class="sr-only" aria-hidden="true">
        <p class="backup-hint">Export ข้อมูลทั้งหมด (Bookmark, Quick URL) เป็นไฟล์ .json สำรอง หรือ Import กลับเพื่อกู้คืน</p>

        <div class="danger-zone">
          <button type="button" class="btn btn-full-danger" id="reset-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            รีเซ็ตข้อมูลทั้งหมด
          </button>
          <p class="backup-hint">ลบ Bookmark และ Quick URL ทั้งหมด แล้วกลับไปใช้ค่าเริ่มต้น — แนะนำให้ Export สำรองไว้ก่อน</p>
        </div>
      </div>

    </aside>
  </div>
</div>

<!-- =========================================================
     MODAL: Add / Edit Bookmark
========================================================== -->
<div class="modal-overlay" id="bm-modal-overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="bm-modal-title">
    <h3 id="bm-modal-title">เพิ่ม Bookmark</h3>
    <form id="bm-form">
      <div class="field">
        <label for="bm-name-input">ชื่อ</label>
        <input type="text" id="bm-name-input" required placeholder="เช่น Gmail">
      </div>
      <div class="field">
        <label for="bm-url-input">URL</label>
        <input type="url" id="bm-url-input" required placeholder="https://example.com">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="bm-cancel-btn">ยกเลิก</button>
        <button type="submit" class="btn btn-primary" id="bm-save-btn">บันทึก</button>
      </div>
    </form>
  </div>
</div>

<!-- =========================================================
     COMMAND PALETTE (Ctrl+K)
========================================================== -->
<div class="palette-overlay" id="palette-overlay">
  <div class="palette" role="dialog" aria-modal="true" aria-label="Command Palette">
    <div class="palette-input-row">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="palette-input" placeholder="ค้นหา Bookmark หรือคำสั่ง..." autocomplete="off">
    </div>
    <div class="palette-results" id="palette-results"></div>
    <div class="palette-footer">
      <span><kbd>↑↓</kbd> เลือก</span>
      <span><kbd>Enter</kbd> เปิด</span>
      <span><kbd>Esc</kbd> ปิด</span>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   STATE & STORAGE
   All persistent data lives in localStorage under a single
   namespaced key so it's easy to inspect / migrate.
   Categories have been removed entirely from the data model.
   ================================================================ */
const STORAGE_KEY = 'homepage_dashboard_v1';

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && Array.isArray(parsed.bookmarks)){
        // Older saves may lack quickUrls — backfill so nothing breaks
        if(!Array.isArray(parsed.quickUrls)) parsed.quickUrls = [];
        return parsed;
      }
    }
  }catch(e){
    console.warn('ไม่สามารถอ่านข้อมูลจาก localStorage ได้ ใช้ค่าเริ่มต้นแทน', e);
  }
  // First run / corrupted data -> build fresh default state (empty)
  return {
    bookmarks: [],
    quickUrls: []
  };
}

let state = loadState();

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('บันทึกข้อมูลไม่สำเร็จ (localStorage อาจเต็มหรือถูกปิดใช้งาน)', e);
    showToast('บันทึกข้อมูลไม่สำเร็จ');
  }
}

/* ================================================================
   TOAST helper
   ================================================================ */
let toastTimer = null;
function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ================================================================
   Small helper: zero-pad a number (used for the frame counter)
   ================================================================ */
function pad(n){ return n.toString().padStart(2, '0'); }

/* ================================================================
   FAVICON helper — DuckDuckGo's favicon service returns the
   actual per-app icon (e.g. Google Docs, not just the Google logo).
   Falls back to a generated initial-letter badge on error.
   ================================================================ */
function getFaviconUrl(url){
  try{
    const u = new URL(url);
    return `https://icons.duckduckgo.com/ip3/${u.hostname}.ico`;
  }catch(e){
    return '';
  }
}

function faviconMarkup(bm){
  const favUrl = getFaviconUrl(bm.url);
  const letter = (bm.name || '?').trim().charAt(0).toUpperCase();
  if(favUrl){
    return `<img src="${favUrl}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${letter}',style:'font-weight:700;color:var(--paper-dim);font-size:14px;'}))">`;
  }
  return `<span style="font-weight:700;color:var(--paper-dim);font-size:14px;">${letter}</span>`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* Shorten a URL to just its hostname, for the small caption under
   each bookmark card — mimics a frame label rather than showing
   the full address. */
function shortHost(url){
  try{
    return new URL(url).hostname.replace(/^www\./, '');
  }catch(e){
    return url;
  }
}

/* ================================================================
   BOOKMARK MANAGER — grid, add/edit/delete, drag & drop reorder
   ================================================================ */
const bookmarkGrid = document.getElementById('bookmark-grid');
let dragSourceId = null;

function renderBookmarks(){
  const sorted = state.bookmarks.slice().sort((a, b) => a.order - b.order);

  document.getElementById('frame-counter').textContent = `EXP. ${pad(sorted.length)}`;

  if(sorted.length === 0){
    bookmarkGrid.innerHTML = `<div class="empty-state">ม้วนฟิล์มยังว่างอยู่ — กดปุ่ม "เพิ่ม Bookmark" เพื่อเริ่มเก็บภาพแรก</div>`;
    return;
  }

  bookmarkGrid.innerHTML = sorted.map((bm, i) => `
    <div class="bm-card"
         draggable="true"
         data-id="${bm.id}"
         tabindex="0"
         role="link"
         aria-label="เปิด ${escapeHtml(bm.name)}">
      <span class="bm-frame-number">${pad(i + 1)}</span>
      <div class="bm-actions">
        <button type="button" class="bm-action-btn edit-btn" data-action="edit" data-id="${bm.id}" aria-label="แก้ไข ${escapeHtml(bm.name)}">✎</button>
        <button type="button" class="bm-action-btn" data-action="delete" data-id="${bm.id}" aria-label="ลบ ${escapeHtml(bm.name)}">✕</button>
      </div>
      <div class="bm-favicon">${faviconMarkup(bm)}</div>
      <div class="bm-name">${escapeHtml(bm.name)}</div>
      <div class="bm-url-label">${escapeHtml(shortHost(bm.url))}</div>
    </div>
  `).join('') + `
    <div class="bm-card bm-add-card" id="inline-add-card" tabindex="0" role="button" aria-label="เพิ่ม Bookmark ใหม่">
      <span class="plus">+</span>
      <span style="font-size:12px;">เพิ่ม Bookmark</span>
    </div>
  `;

  // Open bookmark on click (ignore clicks that hit the action buttons)
  bookmarkGrid.querySelectorAll('.bm-card[data-id]').forEach(card => {
    card.addEventListener('click', (e) => {
      if(e.target.closest('.bm-action-btn')) return;
      const bm = state.bookmarks.find(b => b.id === card.dataset.id);
      if(bm) window.location.href = bm.url;
    });
    card.addEventListener('keydown', (e) => {
      if((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.bm-action-btn')){
        e.preventDefault();
        const bm = state.bookmarks.find(b => b.id === card.dataset.id);
        if(bm) window.location.href = bm.url;
      }
    });

    // Drag & drop reordering
    card.addEventListener('dragstart', () => {
      dragSourceId = card.dataset.id;
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const targetId = card.dataset.id;
      if(dragSourceId && targetId && dragSourceId !== targetId){
        reorderBookmarks(dragSourceId, targetId);
      }
    });
  });

  document.getElementById('inline-add-card')?.addEventListener('click', () => openBookmarkModal());
  document.getElementById('inline-add-card')?.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openBookmarkModal(); }
  });

  // Edit / delete buttons
  bookmarkGrid.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openBookmarkModal(btn.dataset.id);
    });
  });
  bookmarkGrid.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteBookmark(btn.dataset.id);
    });
  });
}

function reorderBookmarks(sourceId, targetId){
  const sorted = state.bookmarks.slice().sort((a,b) => a.order - b.order);
  const sourceIdx = sorted.findIndex(b => b.id === sourceId);
  const targetIdx = sorted.findIndex(b => b.id === targetId);
  if(sourceIdx === -1 || targetIdx === -1) return;

  const [moved] = sorted.splice(sourceIdx, 1);
  sorted.splice(targetIdx, 0, moved);

  sorted.forEach((bm, i) => { bm.order = i; });
  state.bookmarks = sorted;

  saveState();
  renderBookmarks();
}

function deleteBookmark(id){
  const bm = state.bookmarks.find(b => b.id === id);
  if(!bm) return;
  state.bookmarks = state.bookmarks.filter(b => b.id !== id);
  saveState();
  renderBookmarks();
  showToast(`ลบ "${bm.name}" แล้ว`);
}

/* ---------- Add / Edit Modal ---------- */
const bmModalOverlay = document.getElementById('bm-modal-overlay');
const bmForm = document.getElementById('bm-form');
const bmNameInput = document.getElementById('bm-name-input');
const bmUrlInput = document.getElementById('bm-url-input');
const bmModalTitle = document.getElementById('bm-modal-title');
let editingBookmarkId = null;

function openBookmarkModal(id){
  editingBookmarkId = id || null;

  if(id){
    const bm = state.bookmarks.find(b => b.id === id);
    if(!bm) return;
    bmModalTitle.textContent = 'แก้ไข Bookmark';
    bmNameInput.value = bm.name;
    bmUrlInput.value = bm.url;
  } else {
    bmModalTitle.textContent = 'เพิ่ม Bookmark';
    bmForm.reset();
  }

  bmModalOverlay.classList.add('open');
  setTimeout(() => bmNameInput.focus(), 50);
}

function closeBookmarkModal(){
  bmModalOverlay.classList.remove('open');
  editingBookmarkId = null;
}

document.getElementById('add-bookmark-btn').addEventListener('click', () => openBookmarkModal());
document.getElementById('bm-cancel-btn').addEventListener('click', closeBookmarkModal);
bmModalOverlay.addEventListener('click', (e) => { if(e.target === bmModalOverlay) closeBookmarkModal(); });

bmForm.addEventListener('submit', (e) => {
  e.preventDefault();
  let name = bmNameInput.value.trim();
  let url = bmUrlInput.value.trim();

  if(!name || !url) return;
  if(!/^https?:\/\//i.test(url)) url = 'https://' + url;

  if(editingBookmarkId){
    const bm = state.bookmarks.find(b => b.id === editingBookmarkId);
    if(bm){ bm.name = name; bm.url = url; }
    showToast('แก้ไข Bookmark แล้ว');
  } else {
    const maxOrder = state.bookmarks.reduce((m, b) => Math.max(m, b.order), -1);
    state.bookmarks.push({
      id: 'bm_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name, url,
      order: maxOrder + 1
    });
    showToast('เพิ่ม Bookmark แล้ว');
  }

  saveState();
  renderBookmarks();
  closeBookmarkModal();
});

/* ================================================================
   QUICK URL — paste a link, save it to a list, click to open.
   Supports adding as many links as needed.
   ================================================================ */
const quickUrlForm = document.getElementById('quick-url-form');
const quickUrlInput = document.getElementById('quick-url-input');
const quickUrlListEl = document.getElementById('quick-url-list');

function normalizeUrl(raw){
  let url = raw.trim();
  if(!url) return '';
  if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
  return url;
}

function renderQuickUrls(){
  if(state.quickUrls.length === 0){
    quickUrlListEl.innerHTML = `<div class="quick-url-empty">ยังไม่มีลิงก์ที่บันทึกไว้ — วาง URL ด้านบนแล้วกด Enter</div>`;
    return;
  }

  // Newest link first, so the thing you just pasted is easy to find
  const sorted = state.quickUrls.slice().sort((a, b) => b.createdAt - a.createdAt);

  quickUrlListEl.innerHTML = sorted.map(item => `
    <div class="quick-url-item" data-id="${item.id}" tabindex="0" role="link" aria-label="เปิด ${escapeHtml(item.url)}">
      <span class="quick-url-favicon">${faviconMarkup({ name: item.url, url: item.url })}</span>
      <span class="quick-url-text">${escapeHtml(item.url)}</span>
      <button type="button" class="quick-url-delete" data-id="${item.id}" aria-label="ลบลิงก์นี้">✕</button>
    </div>
  `).join('');

  quickUrlListEl.querySelectorAll('.quick-url-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if(e.target.closest('.quick-url-delete')) return;
      const item = state.quickUrls.find(q => q.id === el.dataset.id);
      if(item) window.location.href = item.url;
    });
    el.addEventListener('keydown', (e) => {
      if((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.quick-url-delete')){
        e.preventDefault();
        const item = state.quickUrls.find(q => q.id === el.dataset.id);
        if(item) window.location.href = item.url;
      }
    });
  });

  quickUrlListEl.querySelectorAll('.quick-url-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.quickUrls = state.quickUrls.filter(q => q.id !== btn.dataset.id);
      saveState();
      renderQuickUrls();
    });
  });
}

quickUrlForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const url = normalizeUrl(quickUrlInput.value);
  if(!url) return;

  state.quickUrls.push({
    id: 'qu_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    url,
    createdAt: Date.now()
  });
  saveState();
  quickUrlInput.value = '';
  renderQuickUrls();
  showToast('บันทึกลิงก์แล้ว');
});

/* ================================================================
   BACKUP — Export state to a downloadable .json file,
   and Import a previously exported file back into localStorage.
   ================================================================ */
const exportBtn = document.getElementById('export-btn');
const importBtn = document.getElementById('import-btn');
const importFileInput = document.getElementById('import-file-input');

exportBtn.addEventListener('click', () => {
  try{
    const json = JSON.stringify(state, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);

    const now = new Date();
    const stamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

    const a = document.createElement('a');
    a.href = url;
    a.download = `dashboard-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    showToast('ดาวน์โหลดไฟล์สำรองแล้ว');
  }catch(e){
    console.error('Export ล้มเหลว', e);
    showToast('Export ไม่สำเร็จ');
  }
});

importBtn.addEventListener('click', () => importFileInput.click());

importFileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);

      if(!parsed || !Array.isArray(parsed.bookmarks)){
        showToast('ไฟล์ไม่ถูกต้อง หรือไม่ใช่ไฟล์สำรองของ Dashboard นี้');
        return;
      }

      const confirmed = confirm('การ Import จะแทนที่ Bookmark และ Quick URL ปัจจุบันทั้งหมด ต้องการดำเนินการต่อหรือไม่?');
      if(!confirmed) return;

      state = parsed;
      if(!Array.isArray(state.quickUrls)) state.quickUrls = [];
      saveState();

      renderBookmarks();
      renderQuickUrls();

      showToast('Import ข้อมูลสำเร็จ');
    }catch(err){
      console.error('Import ล้มเหลว', err);
      showToast('ไม่สามารถอ่านไฟล์นี้ได้ — ตรวจสอบว่าเป็นไฟล์ JSON ที่ถูกต้อง');
    }finally{
      importFileInput.value = '';
    }
  };
  reader.onerror = () => {
    showToast('อ่านไฟล์ไม่สำเร็จ');
    importFileInput.value = '';
  };
  reader.readAsText(file);
});

/* ================================================================
   RESET — wipe localStorage and restore default (empty) state.
   Destructive and unrecoverable without a backup, so this requires
   typing a confirmation word, not just clicking OK.
   ================================================================ */
const resetBtn = document.getElementById('reset-btn');

resetBtn.addEventListener('click', () => {
  const firstConfirm = confirm('ต้องการลบ Bookmark และ Quick URL ทั้งหมด แล้วกลับไปใช้ค่าเริ่มต้นใช่หรือไม่?\n\nแนะนำให้กด Export สำรองข้อมูลก่อน หากยังไม่ได้ทำ');
  if(!firstConfirm) return;

  const typed = prompt('การกระทำนี้ไม่สามารถย้อนกลับได้ พิมพ์คำว่า "RESET" (ตัวพิมพ์ใหญ่) เพื่อยืนยัน:');
  if(typed !== 'RESET'){
    showToast('ยกเลิกการรีเซ็ต');
    return;
  }

  try{
    localStorage.removeItem(STORAGE_KEY);
    showToast('รีเซ็ตข้อมูลสำเร็จ กำลังโหลดหน้าใหม่...');
    setTimeout(() => location.reload(), 700);
  }catch(e){
    console.error('รีเซ็ตล้มเหลว', e);
    showToast('รีเซ็ตไม่สำเร็จ');
  }
});

/* ================================================================
   COMMAND PALETTE (Ctrl+K)
   ================================================================ */
const paletteOverlay = document.getElementById('palette-overlay');
const paletteInput = document.getElementById('palette-input');
const paletteResults = document.getElementById('palette-results');
let paletteActiveIndex = 0;
let paletteMatches = [];

function openPalette(){
  paletteOverlay.classList.add('open');
  paletteInput.value = '';
  renderPaletteResults('');
  setTimeout(() => paletteInput.focus(), 50);
}
function closePalette(){
  paletteOverlay.classList.remove('open');
}

function renderPaletteResults(query){
  const q = query.trim().toLowerCase();
  paletteMatches = state.bookmarks
    .filter(b => !q || b.name.toLowerCase().includes(q) || b.url.toLowerCase().includes(q))
    .sort((a,b) => a.order - b.order);

  paletteActiveIndex = 0;

  if(paletteMatches.length === 0){
    paletteResults.innerHTML = `<div class="palette-empty">ไม่พบ Bookmark ที่ตรงกัน — กด Enter เพื่อค้นหาผ่าน Google แทน</div>`;
    return;
  }

  paletteResults.innerHTML = paletteMatches.map((bm, i) => `
    <div class="palette-item ${i === 0 ? 'active' : ''}" data-index="${i}">
      <span class="pf">${faviconMarkup(bm)}</span>
      <span class="pname">${escapeHtml(bm.name)}</span>
      <span class="purl">${escapeHtml(shortHost(bm.url))}</span>
    </div>
  `).join('');

  paletteResults.querySelectorAll('.palette-item').forEach(item => {
    item.addEventListener('click', () => {
      const bm = paletteMatches[Number(item.dataset.index)];
      if(bm){ window.location.href = bm.url; }
    });
    item.addEventListener('mouseenter', () => {
      paletteActiveIndex = Number(item.dataset.index);
      highlightPaletteActive();
    });
  });
}

function highlightPaletteActive(){
  paletteResults.querySelectorAll('.palette-item').forEach(item => {
    item.classList.toggle('active', Number(item.dataset.index) === paletteActiveIndex);
  });
  const activeEl = paletteResults.querySelector('.palette-item.active');
  if(activeEl) activeEl.scrollIntoView({ block: 'nearest' });
}

paletteInput.addEventListener('input', () => renderPaletteResults(paletteInput.value));

paletteInput.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    if(paletteMatches.length){
      paletteActiveIndex = (paletteActiveIndex + 1) % paletteMatches.length;
      highlightPaletteActive();
    }
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(paletteMatches.length){
      paletteActiveIndex = (paletteActiveIndex - 1 + paletteMatches.length) % paletteMatches.length;
      highlightPaletteActive();
    }
  } else if(e.key === 'Enter'){
    e.preventDefault();
    if(paletteMatches.length){
      const bm = paletteMatches[paletteActiveIndex];
      window.location.href = bm.url;
    } else if(paletteInput.value.trim()){
      window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(paletteInput.value.trim());
    }
  } else if(e.key === 'Escape'){
    closePalette();
  }
});

paletteOverlay.addEventListener('click', (e) => { if(e.target === paletteOverlay) closePalette(); });

/* ================================================================
   GLOBAL KEYBOARD SHORTCUTS
   Ctrl+K / Cmd+K -> open Command Palette
   Escape         -> close any open overlay
   ================================================================ */
document.addEventListener('keydown', (e) => {
  const isCtrlK = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k';
  if(isCtrlK){
    e.preventDefault();
    if(paletteOverlay.classList.contains('open')){
      closePalette();
    } else {
      openPalette();
    }
    return;
  }
  if(e.key === 'Escape'){
    if(bmModalOverlay.classList.contains('open')) closeBookmarkModal();
  }
});

/* ================================================================
   SIGNATURE BACKGROUND — film grain canvas.
   Drawn once as a static random-noise tile (cheap: no per-frame
   redraw needed), then CSS handles the "overlay" blend + opacity.
   Regenerated only on resize so it always covers the viewport.
   ================================================================ */
(function filmGrain(){
  const canvas = document.getElementById('grain-canvas');
  const ctx = canvas.getContext('2d');

  function draw(){
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';

    const imageData = ctx.createImageData(canvas.width, canvas.height);
    const buf = imageData.data;
    for(let i = 0; i < buf.length; i += 4){
      const v = Math.floor(Math.random() * 255);
      buf[i] = v; buf[i+1] = v; buf[i+2] = v; buf[i+3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  draw();

  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(draw, 200);
  });
})();

/* ================================================================
   INITIAL RENDER
   ================================================================ */
renderBookmarks();
renderQuickUrls();
</script>
